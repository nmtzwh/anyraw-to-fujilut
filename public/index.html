<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FujiLUT — Electron</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-container">
    <!-- Header with controls -->
    <header class="app-header">
        <div class="header-left">
            <h1>FujiLUT<span style="font-size:0.7em;font-weight:400;color:var(--text-muted);margin-left:0.5rem">| Pro</span></h1>
            <div class="backend-status">
                <div id="backend-dot" class="status-dot pending"></div>
                <span id="backend-label">Checking backend…</span>
                <span id="backend-version" style="display:none;"></span>
            </div>
        </div>
        <div class="header-controls">
            <button id="btn-open-folder" class="btn-secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                Open Folder
            </button>
            <button id="btn-open-raw" class="btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Open RAW
            </button>
            <button id="btn-select-luts" class="btn-secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                Select LUTs
            </button>
            <button id="btn-convert" class="btn-primary" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                Convert
            </button>
            <button id="btn-export" class="btn-secondary" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Export Selected
            </button>
        </div>
    </header>

    <div class="progress-container">
        <div class="progress-bar"><div class="progress" id="progress-fill"></div></div>
        <div class="status-label" id="status-label">Ready. Open a RAW photo to begin.</div>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="raw-file-input" accept=".arw,.nef,.cr2,.cr3,.dng,.orf,.rw2,.raf" multiple hidden>
    <input type="file" id="lut-files-input" accept=".cube" multiple hidden>

    <!-- Main Workspace -->
    <main class="main-workspace">
        <div style="flex: 1; display: flex; flex-direction: column; gap: 1rem; min-width: 0;">
            <div class="preview-section">
                <div class="preview-header">
                    <div class="view-toggle" id="view-toggle" style="display:none;">
                        <button id="btn-view-single" class="toggle-btn active">Single</button>
                        <button id="btn-view-grid" class="toggle-btn">Grid</button>
                    </div>
                </div>
                <div class="preview-content">
                    <div class="preview-image-wrapper" style="display: none;">
                        <img id="preview-image" class="preview-image" alt="Preview">
                        <div id="btn-toggle-original" class="toggle-overlay">Show Original</div>
                        <div class="loading-spinner"></div>
                    </div>
                    <div class="no-image-selected" id="no-image-selected">
                        <div class="placeholder-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </div>
                        <h2>Ready to color grade</h2>
                        <p>Open a folder of RAW images or select a single RAW file to get started.</p>
                        <div class="placeholder-actions" style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                            <button onclick="document.getElementById('btn-open-folder').click()" class="btn-secondary">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                Open Folder
                            </button>
                            <button onclick="document.getElementById('btn-open-raw').click()" class="btn-primary">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                Open RAW
                            </button>
                        </div>
                    </div>
                    <!-- Grid Container inside Preview Content -->
                    <div id="grid-container" class="grid-container" style="display:none;"></div>
                </div>
            </div>
            
            <div id="filmstrip-container" class="filmstrip" style="display:none;">
                <!-- Filled dynamically by JS -->
            </div>
        </div>

        <aside class="sidebar">
            <div class="panel glass-panel lut-panel">
                <h3>Applied LUTs</h3>
                <div class="lut-list-wrapper">
                    <ul class="lut-list" id="lut-list">
                        <!-- Items injected dynamically -->
                    </ul>
                    <div id="no-luts-msg" class="no-lut-placeholder">No LUTs applied yet</div>
                </div>
                
                <div class="control-group" style="margin-top:auto; padding-top:1rem; border-top:1px solid var(--bg-glass-border);">
                    <label class="checkbox-container">
                        <input type="checkbox" id="select-all-cb">
                        <span class="checkmark"></span>
                        Select All for Export
                    </label>
                </div>
            </div>

            <div class="panel glass-panel">
                <h3>Exposure</h3>
                <div class="exposure-controls">
                    <div class="slider-row">
                        <input type="range" id="exposure-slider" min="-30" max="30" value="0" step="1">
                        <span id="exposure-value" class="badge">0.0 EV</span>
                    </div>
                    <button id="btn-apply-exposure" class="btn-primary w-100" disabled>Apply Exposure</button>
                </div>
                
                <h3 style="margin-top:1.5rem">Histogram</h3>
                <div class="histogram-container">
                    <canvas id="histogram-canvas" width="256" height="80"></canvas>
                </div>
            </div>
        </aside>
    </main>

    <!-- Error modal -->
    <div id="error-modal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f44336" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            </div>
            <h2>Conversion Failed</h2>
            <p id="error-modal-message"></p>
            <div class="modal-actions">
                <button id="btn-retry-conversion" class="btn-primary">Retry</button>
                <button id="btn-dismiss-error" class="btn-secondary">Dismiss</button>
            </div>
        </div>
    </div>
</div>

<script src="build/app.js" type="module"></script>
</body>
</html>
