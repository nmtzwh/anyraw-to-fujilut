<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FujiLUT — Electron</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background: #1a1a1a; color: #eee; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .backend-status { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: #2a2a2a; border-radius: 4px; margin-bottom: 1rem; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #888; }
        .status-dot.ok { background: #4caf50; }
        .status-dot.error { background: #f44336; }
        .status-dot.pending { background: #ff9800; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.4 } }
        h1 { font-size: 1.2rem; margin: 0 0 0.5rem; }
        p { color: #aaa; font-size: 0.875rem; }
        code { background: #333; padding: 0.1rem 0.3rem; border-radius: 3px; }

        /* ── Control bar ── */
        .control-bar { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; }
        .control-bar button { padding: 0.4rem 0.9rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; background: #333; color: #eee; }
        .control-bar button:hover:not(:disabled) { background: #444; }
        .control-bar button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── Progress ── */
        .progress-bar { height: 4px; background: #333; border-radius: 2px; margin-bottom: 0.5rem; overflow: hidden; display: none; }
        .progress { height: 100%; background: #4caf50; transition: width 0.2s; width: 0%; }

        /* ── Status ── */
        .status-label { min-height: 1.2em; color: #aaa; font-size: 0.875rem; margin-bottom: 0.5rem; }
        .status-label.error { color: #f44336; }

        /* ── Main layout ── */
        .main-content { display: grid; grid-template-columns: 1fr 320px; gap: 1rem; }
        @media (max-width: 700px) { .main-content { grid-template-columns: 1fr; } }

        /* ── Preview ── */
        .preview-panel { background: #222; border-radius: 6px; overflow: hidden; min-height: 300px; position: relative; display: flex; align-items: center; justify-content: center; }
        .preview-image { max-width: 100%; max-height: 70vh; display: none; }
        .no-image-selected { color: #555; font-size: 0.875rem; text-align: center; padding: 2rem; }

        /* ── Side panel ── */
        .list-panel { display: flex; flex-direction: column; gap: 0.75rem; }
        .lut-list-container { background: #222; border-radius: 6px; padding: 0.75rem; max-height: 40vh; overflow-y: auto; }
        .lut-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.4rem; }
        .lut-list li { display: flex; align-items: center; gap: 0.4rem; font-size: 0.875rem; cursor: pointer; padding: 0.3rem 0.5rem; border-radius: 3px; }
        .lut-list li:hover { background: #333; }
        .lut-list li.selected { background: #3a3a3a; }
        .lut-list li img { width: 24px; height: 24px; object-fit: cover; border-radius: 2px; }

        /* ── Controls ── */
        .controls-container { background: #222; border-radius: 6px; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .select-all-container { display: flex; align-items: center; gap: 0.4rem; font-size: 0.875rem; }
        .exposure-controls { display: flex; flex-direction: column; gap: 0.4rem; }
        .exposure-controls label { font-size: 0.875rem; color: #aaa; }
        .exposure-controls .ev-row { display: flex; align-items: center; gap: 0.5rem; }
        #exposure-value { font-size: 0.8rem; min-width: 5rem; }
        input[type="range"] { flex: 1; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">

    <!-- Backend health indicator -->
    <div class="backend-status">
        <div id="backend-dot" class="status-dot pending"></div>
        <span id="backend-label">Checking backend…</span>
        <span style="margin-left:auto; color:#888; font-size:0.75rem;">v<span id="backend-version">—</span></span>
    </div>

    <!-- Control bar -->
    <div class="control-bar">
        <button id="btn-open-raw">Open RAW Photo</button>
        <button id="btn-select-luts">Select LUT Files</button>
        <button id="btn-convert" disabled>Convert</button>
        <button id="btn-export" disabled>Export Selected</button>
    </div>

    <!-- Hidden file inputs (triggered by buttons; actual files selected via IPC dialogs) -->
    <input type="file" id="raw-file-input" accept=".arw,.nef,.cr2,.cr3,.dng,.orf,.rw2,.raf" multiple hidden>
    <input type="file" id="lut-files-input" accept=".cube" multiple hidden>

    <!-- Progress bar -->
    <div class="progress-bar"><div class="progress" id="progress-fill"></div></div>

    <!-- Status -->
    <div class="status-label" id="status-label"></div>

    <!-- Main content -->
    <div class="main-content">
        <!-- Preview -->
        <div class="preview-panel">
            <img id="preview-image" class="preview-image" alt="Preview">
            <div class="no-image-selected" id="no-image-selected">No image selected</div>
        </div>

        <!-- Side panel -->
        <div class="list-panel">
            <div class="lut-list-container">
                <ul class="lut-list" id="lut-list"></ul>
            </div>
            <div class="controls-container">
                <div class="select-all-container">
                    <input type="checkbox" id="select-all-cb">
                    <label for="select-all-cb">Select All</label>
                </div>
                <div class="exposure-controls">
                    <label for="exposure-slider">Exposure Offset</label>
                    <div class="ev-row">
                        <input type="range" id="exposure-slider" min="-30" max="30" value="0" step="1">
                        <span id="exposure-value">0.0 EV</span>
                    </div>
                    <button id="btn-apply-exposure" disabled>Apply Exposure</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Thumbnail strip (converted results) -->
    <div class="lut-list" id="thumbnail-container" style="margin-top:1rem; display:flex; gap:0.5rem; overflow-x:auto; padding-bottom:0.5rem;"></div>

    <!-- Error modal overlay -->
    <div id="error-modal" style="
        display:none; position:fixed; top:0; left:0; right:0; bottom:0;
        background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
        <div style="
            background:#2a2a2a; border:1px solid #555; border-radius:8px;
            padding:1.5rem; max-width:400px; text-align:center;">
            <h2 style="color:#f44336; margin:0 0 0.75rem; font-size:1.1rem;">Conversion Failed</h2>
            <p id="error-modal-message" style="color:#ccc; font-size:0.875rem; margin:0 0 1rem;"></p>
            <div style="display:flex; gap:0.5rem; justify-content:center;">
                <button id="btn-retry-conversion" style="
                    padding:0.5rem 1.2rem; border:none; border-radius:4px;
                    cursor:pointer; background:#4caf50; color:#fff; font-size:0.875rem;">
                    Retry
                </button>
                <button id="btn-dismiss-error" style="
                    padding:0.5rem 1.2rem; border:none; border-radius:4px;
                    cursor:pointer; background:#444; color:#ccc; font-size:0.875rem;">
                    Dismiss
                </button>
            </div>
        </div>
    </div>

</div>

<script src="../build/app.js" type="module"></script>
</body>
</html>
